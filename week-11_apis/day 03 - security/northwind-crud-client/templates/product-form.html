<h3>{{formTitle}}</h3>
<input type="hidden" id="productId" value="{{productId}}">
<div class="form-grid">
    <div class="wide">
        <label for="productName" class="form-label">Product Name</label>
        <input id="productName" class="form-control" value="{{productName}}">
    </div>
    <div>
        <label for="unitPrice" class="form-label">Unit Price</label>
        <input id="unitPrice" type="number" step="0.01" min="0" class="form-control" value="{{unitPrice}}">
    </div>
    <div>
        <label for="categoryId" class="form-label">Category</label>
        <select id="categoryId" class="form-select">
            {{#categories}}
            <option value="{{categoryId}}" {{selected}}>{{categoryName}}</option>
            {{/categories}}
        </select>
    </div>
</div>
<div class="form-actions">
    <button class="btn btn-success" onclick="saveProduct()">Save</button>
    <button class="btn btn-secondary" onclick="hideForm('product-form')">Cancel</button>
</div>
