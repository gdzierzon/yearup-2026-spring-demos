<section class="page-title">
    <div>
        <h1>Products</h1>
        <p class="text-muted mb-0">Manage products and assign them to categories.</p>
    </div>
    <button class="btn btn-primary" onclick="newProduct()">Add Product</button>
</section>

<section id="product-form" class="form-panel hidden"></section>

<section class="content-panel split-panel">
    <div class="search-panel">

        <label for="searchCategoryName" class="form-label">Category Name</label>
        <input id="searchCategoryName" class="form-control mb-4" >

        <label for="searchProductName" class="form-label">Product Name</label>
        <input id="searchProductName" class="form-control mb-4" >

        <label for="searchMinPrice" class="form-label">Min Price</label>
        <input id="searchMinPrice" class="form-control mb-4" >

        <label for="searchMaxPrice" class="form-label">Max Price</label>
        <input id="searchMaxPrice" class="form-control" >


        <button class="btn btn-success mt-3" onclick="searchProducts()">Search</button>
    </div>
    <table class="table table-striped table-hover align-middle">
        <thead>
            <tr>
                <th>ID</th>
                <th>Product</th>
                <th>Category</th>
                <th>Unit Price</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {{#products}}
            <tr>
                <td>{{productId}}</td>
                <td>{{productName}}</td>
                <td>{{categoryName}}</td>
                <td>${{unitPrice}}</td>
                <td class="table-actions">
                    <button class="btn btn-sm btn-outline-primary" onclick="editProduct({{productId}})">Edit</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteProduct({{productId}})">Delete</button>
                </td>
            </tr>
            {{/products}}
        </tbody>
    </table>
</section>
