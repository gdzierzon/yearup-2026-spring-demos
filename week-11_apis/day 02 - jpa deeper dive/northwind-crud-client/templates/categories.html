<section class="page-title">
    <div>
        <h1>Categories</h1>
        <p class="text-muted mb-0">Manage product categories.</p>
    </div>
    <button class="btn btn-primary" onclick="newCategory()">Add Category</button>
</section>

<section id="category-form" class="form-panel hidden"></section>

<section class="content-panel">
    <table class="table table-striped table-hover align-middle">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {{#categories}}
            <tr>
                <td>{{categoryId}}</td>
                <td>{{categoryName}}</td>
                <td>{{description}}</td>
                <td class="table-actions">
                    <button class="btn btn-sm btn-outline-primary" onclick="editCategory({{categoryId}})">Edit</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteCategory({{categoryId}})">Delete</button>
                </td>
            </tr>
            {{/categories}}
        </tbody>
    </table>
</section>
