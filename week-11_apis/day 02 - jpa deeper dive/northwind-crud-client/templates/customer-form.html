<h3>{{formTitle}}</h3>
<div class="form-grid">
    <div>
        <label for="customerId" class="form-label">Customer ID</label>
        <input id="customerId" class="form-control" value="{{customerId}}" maxlength="5" {{idReadOnly}}>
    </div>
    <div class="wide">
        <label for="companyName" class="form-label">Company Name</label>
        <input id="companyName" class="form-control" value="{{companyName}}">
    </div>
    <div>
        <label for="contactName" class="form-label">Contact Name</label>
        <input id="contactName" class="form-control" value="{{contactName}}">
    </div>
    <div class="wide">
        <label for="address" class="form-label">Address</label>
        <input id="address" class="form-control" value="{{address}}">
    </div>
    <div>
        <label for="city" class="form-label">City</label>
        <input id="city" class="form-control" value="{{city}}">
    </div>
    <div>
        <label for="state" class="form-label">State / Region</label>
        <input id="state" class="form-control" value="{{state}}">
    </div>
    <div>
        <label for="zip" class="form-label">Postal Code</label>
        <input id="zip" class="form-control" value="{{zip}}">
    </div>
    <div>
        <label for="country" class="form-label">Country</label>
        <input id="country" class="form-control" value="{{country}}">
    </div>
</div>
<div class="form-actions">
    <button class="btn btn-success" onclick="saveCustomer()">Save</button>
    <button class="btn btn-secondary" onclick="hideForm('customer-form')">Cancel</button>
</div>
